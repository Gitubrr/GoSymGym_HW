name: lint_and_format

on:
  push:
    branches: 
        - '**'
  pull_request:
    branches:
        - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Format
        run: go fmt ./...
        
      - name: Vet
        run: go vet ./...
