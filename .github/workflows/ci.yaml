name: CI

on:
  push:
    branches: [ "maim" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Lint
        run: |
          go fmt ./...

      - name: Build
        run: go build -v ./cmd

      # TODO: run for tests (?)
