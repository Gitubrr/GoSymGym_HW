version: '3.8'

services:
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: github-collector
    ports:
      - "50051:50051"
    environment:
      - GRPC_PORT=50051
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - REQUEST_TIMEOUT=30
    networks:
      - github-network
    restart: unless-stopped

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: github-gateway
    ports:
      - "8080:8080"
    environment:
      - HTTP_PORT=8080
      - COLLECTOR_ADDR=collector:50051
    depends_on:
      - collector
    networks:
      - github-network
    restart: unless-stopped

networks:
  github-network:
    driver: bridge