syntax = "proto3";

package collector;
option go_package = "github.com/Gitubrr/GoSymGym/api/collector";

service CollectorService {
    rpc GetRepository(RepoRequest) returns (RepoResponse);
}

message RepoRequest {
    string owner = 1;
    string repo = 2;
}

message RepoResponse {
    string name = 1;
    string full_name = 2;
    string description = 3;
    int32 stars = 4;
    int32 forks = 5;
    string created_at = 6;
}